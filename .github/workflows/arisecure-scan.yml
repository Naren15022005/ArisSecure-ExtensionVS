name: ArisSecure Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  security-scan:
    name: Security & Quality Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build extension
        run: npm run build

      - name: Build CLI
        run: |
          npx esbuild ./src/cli/ArisSecureCLI.ts \
            --bundle \
            --outfile=dist/cli.js \
            --platform=node \
            --external:vscode

      - name: Run ArisSecure scan (JSON)
        id: scan
        run: |
          node dist/cli.js --path ./src --format json --output scan-report.json || true
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"

      - name: Run ArisSecure scan (human-readable)
        run: node dist/cli.js --path ./src --format text || true

      - name: Comment PR with scan results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            if (!fs.existsSync('scan-report.json')) return;
            const results = JSON.parse(fs.readFileSync('scan-report.json', 'utf-8'));
            const total = results.reduce((n, r) => n + r.issues.length, 0);
            const critical = results.flatMap(r => r.issues).filter(i => i.severity === 'critical').length;
            const body = [
              '## 🛡️ ArisSecure Scan Results',
              '',
              `**${total} issue(s)** found — **${critical} critical**`,
              '',
              results.slice(0, 10).map(r =>
                `### \`${r.file}\`\n` +
                r.issues.slice(0, 5).map(i =>
                  `- **[${i.severity.toUpperCase()}]** L${i.line}: \`${i.title}\` — ${i.message}`
                ).join('\n')
              ).join('\n\n'),
              '',
              total > 10 ? `_… and ${total - 10} more. Download the artifact for the full report._` : '',
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Block merge on critical issues
        run: node dist/cli.js --path ./src --severity critical --format text

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arisecure-report
          path: scan-report.json
          retention-days: 30
